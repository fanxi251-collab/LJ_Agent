<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>游客反馈处理</title>
    <link rel="stylesheet" href="/static/app.css" />
    <link rel="stylesheet" href="/static/admin.css" />
    <link rel="stylesheet" href="/static/admin_services.css" />
  </head>
  <body>
    <div class="admin-app-shell">
      <aside class="admin-sidebar">
        <div class="admin-brand"><div class="admin-brand-mark">LJ</div><div><strong>LingJing AI</strong><span>管理中心</span></div></div>
        <nav class="admin-sidebar-nav" aria-label="管理端导航">
          <a class="admin-nav-item" href="/admin/analytics"><svg viewBox="0 0 24 24"><path d="M4 19V9m6 10V5m6 14v-7m4 7H2" /></svg><span>游客分析</span></a>
          <a class="admin-nav-item" href="/admin/attractions"><svg viewBox="0 0 24 24"><path d="m3 20 6-10 4 6 3-4 5 8H3Z" /></svg><span>景点资料</span></a>
          <a class="admin-nav-item" href="/admin/documents"><svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6z" /></svg><span>知识库资料</span></a>
          <a class="admin-nav-item" href="/admin/foods"><svg viewBox="0 0 24 24"><path d="M4 10h16c0 5-3 9-8 9s-8-4-8-9Z" /></svg><span>美食推荐</span></a>
          <a class="admin-nav-item active" href="/admin/feedback"><svg viewBox="0 0 24 24"><path d="M4 4h16v13H9l-5 4V4Z" /><path d="M8 9h8m-8 4h5" /></svg><span>游客反馈</span></a>
        </nav>
        <p class="admin-sidebar-note">比赛演示环境<br />结构化内容与游客洞察中心</p>
      </aside>
      <main class="admin-main"><div class="admin-main-scroll"><section class="chat-shell feedback-admin-shell" aria-label="游客反馈处理">
        <header class="topbar"><div><p class="eyebrow">LingJing AI Admin</p><h1>游客反馈处理</h1></div><span class="status-pill" id="adminState">管理端在线</span></header>
        <section class="feedback-admin-summary"><div><strong id="pendingCount">0</strong><span>待处理</span></div><div><strong id="processingCount">0</strong><span>处理中</span></div><div><strong id="resolvedCount">0</strong><span>已解决</span></div></section>
        <section class="feedback-admin-filters"><input id="feedbackSearch" type="search" placeholder="搜索内容、联系方式或编号" /><select id="feedbackStatus"><option value="">全部状态</option><option value="pending">待处理</option><option value="processing">处理中</option><option value="resolved">已解决</option></select><select id="feedbackCategory"><option value="">全部类型</option><option value="service">服务体验</option><option value="environment">环境卫生</option><option value="facility">设施指引</option><option value="food">餐饮体验</option><option value="guide">导游讲解</option><option value="other">其他</option></select><select id="feedbackRating"><option value="">全部评分</option><option value="5">5 星</option><option value="4">4 星</option><option value="3">3 星</option><option value="2">2 星</option><option value="1">1 星</option></select></section>
        <section class="feedback-admin-layout">
          <div id="feedbackList" class="feedback-admin-list"></div>
          <form id="feedbackForm" class="feedback-admin-detail"><div id="feedbackEmpty" class="feedback-admin-empty">从左侧选择一条反馈，查看联系方式并跟进处理。</div><div id="feedbackFields" hidden><div class="section-heading"><h2 id="feedbackTitle">反馈详情</h2><span id="feedbackCreated"></span></div><dl id="feedbackMeta"></dl><article id="feedbackContent"></article><label>处理状态<select id="updateStatus"><option value="pending">待处理</option><option value="processing">处理中</option><option value="resolved">已解决</option></select></label><label>管理员回复<textarea id="adminReply" maxlength="1000" placeholder="该回复将对提交者可见"></textarea></label><button type="submit">保存处理结果</button></div></form>
        </section>
      </section></div></main>
    </div>
    <script src="/static/admin_feedback.js"></script>
  </body>
</html>
